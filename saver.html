<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz History - My Scores</title>
    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #000;
        }

        a, a:link, a:visited, a:hover, a:active {
            text-decoration: none;
            color: inherit;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            border-bottom: 1px solid #000;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .window-header a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
        }

        .window-header span {
            font-size: 1.1rem;
        }

        .page-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 12px;
        }

        .container {
            width: min(520px, calc(100% - 24px));
            border: 1px solid #000;
            border-radius: 22px;
            padding: 28px 22px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.08);
            text-align: center;
            background: #fff;
        }

        h2 { margin:0; font-size:1.5rem; }
        .sub { color:#555; margin-top:8px; font-size:0.95rem; }

        .history-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            padding:12px 14px;
            border-radius:12px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border: 1px solid #000;
            background: #fff;
        }

        .history-item .meta { color:#333 }
        .history-item .meta .date { display:block; color:#666; font-size:0.85rem; margin-top:4px }

        .score-pill {
            padding:8px 14px;
            border-radius:999px;
            font-weight:800;
            border:1px solid #000;
            background:#000;
            color:#fff;
        }

        .no-data { padding:40px; color:#666; }

        .actions { display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap }

        .btn-primary, .btn-outline {
            border-radius:999px; padding:12px 18px; min-width:120px; font-weight:800; cursor:pointer; letter-spacing:0.05em; border:2px solid #000; background:#fff; color:#000;
        }
        .btn-primary { background:#000; color:#fff }
        .btn-outline:hover, .btn-primary:hover { transform: translateY(-1px) }

        @media (max-width:640px) {
            .window-header {
                padding: 16px 18px;
            }

            .container { padding:22px 16px }
            .actions { flex-direction:column; align-items:stretch }
            .btn-primary, .btn-outline { width:100% }
        }
    </style>
</head>
<body>
    <div class="window-header">
        <a href="./landing page.html">QuizMaker</a>
        <span>+ 👤</span>
    </div>

    <div class="page-content">
        <div class="container">
            <h2>My Quiz History</h2>
            <div class="sub">Review your previous performances</div>

            <div id="historyList" class="history-list"></div>

            <div class="actions">
                <button class="btn-outline" onclick="window.location.href='index.html'">TAKE NEW QUIZ</button>
                <button class="btn-primary" onclick="clearHistory()">CLEAR HISTORY</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { CONFIG } from './config.js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        function getClientId() {
        let id = localStorage.getItem('quizClientId');
        if (!id) {
            id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('id-' + Date.now() + '-' + Math.random().toString(36).slice(2));
            localStorage.setItem('quizClientId', id);
        }
        return id;
        }

        async function loadHistory() {
            const historyContainer = document.getElementById('historyList');
            try {
                const client_id = getClientId();
                const { data, error } = await supabase
                .from('quiz_history')
                .select('*')
                .eq('client_id', client_id)
                .order('timestamp', { ascending: false });

                if (!error && data && data.length) {
                const history = data.map(row => {
                    if (row.raw) return { ...JSON.parse(row.raw), timestamp: new Date(row.timestamp).toLocaleString() };
                    return { score: row.score, total: row.total, timestamp: new Date(row.timestamp).toLocaleString() };
                });

                renderHistory(historyContainer, history);
                return;
                }
            } catch (e) {
                console.warn('Supabase read failed, falling back to localStorage', e);
            }

            const localHistory = JSON.parse(localStorage.getItem('quizHistory') || '[]');
            renderHistory(historyContainer, localHistory);
        }

        function renderHistory(container, history) {
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="no-data">No quiz history yet. Take a quiz to see results here!</div>';
                return;
            }

            container.innerHTML = history.map((item, index) => {
                const attemptNumber = history.length - index;
                const quizName = item.topic || 'Untitled Quiz';
                const when = item.timestamp || item.date || 'Date unknown';
                const score = (typeof item.score !== 'undefined') ? `${item.score} / ${item.total || '?'}` : (item.result ? item.result : '—');
                return `
                <div class="history-item">
                    <div class="meta">
                    <div style="font-weight:700">Attempt #${attemptNumber} | ${quizName}</div>
                    <div class="date">${when}</div>
                    </div>
                    <div class="score-pill">${score}</div>
                </div>
                `;
            }).join('');
        }

        async function clearHistory() {
            if (confirm('Are you sure you want to delete all previous scores?')) {
                try {
                    const client_id = getClientId();
                    const { error } = await supabase.from('quiz_history').delete().eq('client_id', client_id);
                    if (error) throw error;
                } catch (e) {
                    console.warn('Supabase delete failed, clearing localStorage only', e);
                } finally {
                    localStorage.removeItem('quizHistory');
                    await loadHistory();
                }
            }
        }

        loadHistory();

        window.clearHistory = clearHistory;
    </script>
</body>
</html>
