<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz History - My Scores</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--primary); }

        .history-item {
            background: var(--bg);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(5px);
        }

        .score-pill {
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .date-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .no-data {
            text-align: center;
            color: #95a5a6;
            padding: 40px;
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-back { background: var(--primary); color: white; }
        .btn-clear { background: #95a5a6; color: white; }
        button:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Quiz History</h1>
            <p>Review your previous performances</p>
        </header>

        <div id="historyList">
            <!-- Results will be injected here -->
        </div>

        <div class="btn-group">
            <button class="btn-back" onclick="window.location.href='index.html'">Take New Quiz</button>
            <button class="btn-clear" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
        function loadHistory() {
            const container = document.getElementById('historyList');
            // Pulling the array we talked about earlier
            const history = JSON.parse(localStorage.getItem('quizHistory')) || [];

            if (history.length === 0) {
                container.innerHTML = '<div class="no-data">No previous scores found yet. Complete a quiz to see results!</div>';
                return;
            }

            // Reverse history to show newest first
            container.innerHTML = history.reverse().map((item, index) => `
                <div class="history-item">
                    <div>
                        <div style="font-weight:600">Attempt #${history.length - index}</div>
                        <div class="date-text">${item.date || 'Date unknown'}</div>
                    </div>
                    <div class="score-pill">
                        ${item.score} / ${item.total}
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("Are you sure you want to delete all previous scores?")) {
                localStorage.removeItem('quizHistory');
                loadHistory();
            }
        }

        // Initial load
        loadHistory();
    </script>
</body>
</html>
