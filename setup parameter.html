<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaker+ | Gemini AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --fg: #000000;
            --muted: #555555;
            --line: #000000;
            --soft-line: #e6e6e6;
            --panel: #ffffff;
            --shadow: 0 18px 44px rgba(0, 0, 0, 0.08);
            --radius: 22px;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            background:
                radial-gradient(circle at top, rgba(0,0,0,0.05), transparent 30%),
                var(--bg);
        }

        a, a:link, a:visited, a:hover, a:active {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            letter-spacing: 0.3px;
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--soft-line);
        }

        .window-header a {
            font-size: 1.05rem;
        }

        .window-header span {
            font-size: 1.1rem;
        }

        h2 {
            margin: 0 0 22px;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        form {
            display: grid;
            gap: 4px;
        }

        label {
            display: block;
            font-weight: 700;
            margin: 0 0 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 14px 14px;
            margin-bottom: 18px;
            border: 2px solid #000;
            border-radius: 16px;
            background: #fff;
            color: #000;
            outline: none;
            transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="file"]:focus {
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.10);
        }

        .toggle-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-group input[type="radio"] {
            display: none;
        }

        .toggle-group label {
            margin: 0;
            text-align: center;
            padding: 13px 12px;
            border: 2px solid #000;
            border-radius: 16px;
            cursor: pointer;
            transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
            background: #fff;
            font-weight: 700;
            user-select: none;
        }

        .toggle-group input[type="radio"]:checked + label {
            background: #000;
            color: #fff;
        }

        .toggle-group label:hover {
            transform: translateY(-1px);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 26px;
        }

        .checkbox-item {
            margin: 0;
            padding: 12px 14px;
            border: 1px solid #000;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            background: #fff;
            transition: transform 0.18s ease, background-color 0.18s ease;
        }

        .checkbox-item:hover {
            transform: translateY(-1px);
            background: #fafafa;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #000;
            margin: 0;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 18px;
            margin-top: 6px;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: transform 0.18s ease, background-color 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            background: #222;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 20px 16px;
                border-radius: 20px;
            }

            .toggle-group,
            .checkbox-group {
                grid-template-columns: 1fr;
            }

            input[type="text"],
            input[type="number"],
            input[type="file"] {
                margin-bottom: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="window-header"><a href="./landing page.html">QuizMaker </a><span>+ 👤</span></div>
        <h2>Configure Your Quiz</h2>

        <form id="quiz-form">
            <label for="itopic">Topic or Subject</label>
            <input type="text" id="itopic" name="topic" placeholder="e.g. Ancient Rome" required><br>

            <label for="ifile">Reference File (Optional)</label>
            <input type="file" id="ifile" name="file" accept="image/*"><br>
            <div id="image-preview" style="display:none; margin-top: 10px; margin-bottom: 14px;">
                <img id="preview-img" src="" alt="Preview" style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <label for="inumber">Number of Questions</label>
            <input type="number" id="inumber" name="number" min="5" max="50" value="10"><br>

            <label>Difficulty Level</label>
            <div class="toggle-group">
                <input type="radio" id="ieasy" name="difficulty" value="easy">
                <label for="ieasy">Easy</label>

                <input type="radio" id="imedium" name="difficulty" value="medium" checked>
                <label for="imedium">Medium</label>

                <input type="radio" id="ihard" name="difficulty" value="hard">
                <label for="ihard">Hard</label>
            </div>

            <label>Question Types</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="types" value="MCQ" checked> Multiple Choice</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="SHORT_ANSWER"> Identification</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="TRUE_FALSE"> True/False</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="ENUMERATION"> Enumeration</label>
            </div>

            <button type="submit" class="btn-primary">Generate Quiz</button>
        </form>
    </div>

    <script type="module">
        // toremember: update the quiz.html to support the choice array schema which is always array
        import { GoogleGenerativeAI, SchemaType} from "https://esm.run/@google/generative-ai";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { CONFIG } from './config-loader.js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const API_KEY = CONFIG.GEMINI_KEY;
        const genAI = new GoogleGenerativeAI(API_KEY);
        const quizForm = document.getElementById('quiz-form');
        const schema = {
            type: SchemaType.OBJECT,
            required: ["questions"],
            properties: {
                questions: {
                    type: SchemaType.ARRAY,
                    items: {
                        type: SchemaType.OBJECT,
                        required: ["type", "text", "choices", "correctAnswer", "expectedCount"],
                        properties: {
                            type: { 
                                type: SchemaType.STRING, 
                                enum: ["MCQ", "TRUE_FALSE", "SHORT_ANSWER", "ENUMERATION"] 
                            },
                            text: { type: SchemaType.STRING },
                            choices: { type: SchemaType.ARRAY, items: { type: SchemaType.STRING } },
                            correctAnswer: { type: SchemaType.ARRAY, items: { type: SchemaType.STRING }, description: "Provide all common variations of the correct answer (e.g, synonyms, alternative phrasings). " },
                            expectedCount: { type: SchemaType.INTEGER }
                        }
                    }
                }
            }
        };
        const submitBtn = document.querySelector('button');
        const ifile = document.getElementById('ifile');
        const previewContainer = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');

        ifile.addEventListener('change', () => {
            const file = ifile.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                previewContainer.style.display = 'none';
            }
        });

        async function fileToGenerativePart(file) {
            const base64EncodedDataPromise = new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            return {
                inlineData: {
                    data: await base64EncodedDataPromise,
                    mimeType: file.type
                },
            };
        }

        async function runGemini(promptContent, metadata) {
            const modelPrioList = [
                "gemini-flash-latest",
                "gemini-flash-lite-latest",
                "gemini-pro-latest"
            ];

            for(const modelId of modelPrioList){
                try {
                    console.log(`Attempting request with: ${modelId}`);
                    submitBtn.disabled = true;
                    submitBtn.textContent = "Generating...";
                    
                    const model = genAI.getGenerativeModel({
                        model: modelId,
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: schema,
                            temperature: 0.7,
                        },
                    });

                    const result = await model.generateContent(promptContent);
                    const aiOutput = JSON.parse(result.response.text());

                    const quizEnvelope = {
                        id: crypto.randomUUID(),
                        topic: metadata.topic,
                        difficulty: metadata.difficulty,
                        createdAt: new Date().toISOString(),
                        questions: aiOutput.questions.map(q=>({
                            id: crypto.randomUUID(),
                            ...q // spread operator :O; includes type, text, choices, correctAnswer, expectedCount
                        }))
                    };
                    console.log(JSON.stringify(quizEnvelope, null, 2));
                    sessionStorage.setItem('activeQuiz', JSON.stringify(quizEnvelope));

                    const { error } = await supabase
                    .from('quizzes')
                    .insert([
                        {
                            id: quizEnvelope.id,
                            topic: quizEnvelope.topic,
                            difficulty: quizEnvelope.difficulty,
                            data: quizEnvelope,
                            created_at: quizEnvelope.createdAt
                        }
                    ]);

                    if (error) throw error;
                    console.log("Quiz Generated! Redirecting to editor...");
                    window.location.href = 'editor.html';
                    break;
                } 
                catch (error) {
                    console.error("Error:", error);
                    submitBtn.textContent = `Error with ${modelId}, trying next...`;
                } 
                finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Generate Quiz";
                }
            }
            
        }
        quizForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(quizForm);

            const metadata = {
                topic: formData.get('topic'),
                number: formData.get('number'),
                difficulty: formData.get('difficulty'),
                types: formData.getAll('types')
            };

            if (metadata.types.length === 0) {
                alert("Please select at least one question type!");
                return;
            }

            const promptText = `Generate a ${metadata.number}-question ${metadata.difficulty} quiz about ${metadata.topic}. Use only these types: ${metadata.types.join(', ')}.`;
            
            let promptContent = [promptText];
            const file = formData.get('file');
            if (file && file.size > 0 && file.type.startsWith('image/')) {
                const imagePart = await fileToGenerativePart(file);
                promptContent.push(imagePart);
            }

            console.log("Prompting:", promptText);
            await runGemini(promptContent, metadata);
        });

        async function getModels() {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();
                
                const tableData = data.models.map(m => ({
                    "Model ID": m.name.split('/')[1],
                    "Input Limit": m.inputTokenLimit.toLocaleString(),
                    "Output Limit": m.outputTokenLimit.toLocaleString(),
                    "Thinking?": m.thinking ? "Yes" : "No"
                }));
                console.table(tableData);

                return data;
            } catch (e) {
                console.error("Failed to fetch models via REST:", e);
            }
        }

        getModels();
    </script>
</body>
</html>
