<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaker Library</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #000;
        }

        a, a:link, a:visited, a:hover, a:active {
            text-decoration: none;
            color: inherit;
        }

        body {
            min-height: 100vh;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            border-bottom: 1px solid #000;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .window-header a {
            font-size: 1.05rem;
        }

        .window-header span {
            font-size: 1.1rem;
        }

        .container {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
            padding: 36px 0 60px;
        }

        .library-top {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5e5;
        }

        .library-top h2 {
            margin: 0;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            letter-spacing: -0.03em;
        }

        .search-hint {
            color: #666;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        #quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .quiz-card {
            border: 1px solid #000;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .quiz-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.10);
        }

        .quiz-card-inner {
            padding: 18px;
        }

        .quiz-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .quiz-topic {
            margin: 0 0 4px;
            font-size: 1.15rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .quiz-difficulty {
            color: #555;
            font-size: 0.92rem;
        }

        .delete-btn {
            background: #fff;
            border: 1px solid #000;
            cursor: pointer;
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            font-size: 1.1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            flex: 0 0 auto;
        }

        .delete-btn:hover {
            background: #000;
            color: #fff;
            transform: scale(1.03);
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-primary,
        .btn-outline-sm {
            padding: 12px 14px;
            border-radius: 999px;
            border: 2px solid #000;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .btn-primary {
            width: 100%;
            background: #000;
            color: #fff;
        }

        .btn-outline-sm {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover,
        .btn-outline-sm:hover {
            transform: translateY(-1px);
        }

        .btn-primary:hover {
            background: #222;
        }

        .btn-outline-sm:hover {
            background: #000;
            color: #fff;
        }

        .btn-primary:active,
        .btn-outline-sm:active {
            transform: translateY(0);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 40px 16px;
            border: 1px dashed #cfcfcf;
            border-radius: 16px;
            background: #fafafa;
        }

        @media (max-width: 640px) {
            .window-header {
                padding: 16px 18px;
            }

            .container {
                width: min(100%, calc(100% - 24px));
                padding-top: 24px;
            }

            .library-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-hint {
                white-space: normal;
            }

            #quiz-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="window-header">
        <a href="./landing page.html">QuizMaker</a>
        <span>+ 👤</span>
    </div>

    <div id="quiz-library" class="container">
        <div class="library-top">
            <h2>Your Library</h2>
            <span class="search-hint">Search for a quiz...</span>
        </div>

        <div id="quiz-grid"></div>

        <!-- Repeat for more resul -->
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { CONFIG } from './config.js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const quizManager = {
            async saveQuiz(quizEnvelope){
                sessionStorage.setItem('activeQuiz', JSON.stringify(quizEnvelope));
                const { error } = await supabase
                    .from('quizzes')
                    .insert({
                        id: quizEnvelope.id,
                        topic: quizEnvelope.topic,
                        difficulty: quizEnvelope.difficulty,
                        data: quizEnvelope,
                        created_at: new Date().toISOString()
                    });
                if (error) console.error('Error saving quiz:', error);
                this.renderList();
            },

            async sync(){
                const { data, error } = await supabase
                    .from('quizzes')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (data) {
                    localStorage.setItem('cached_quizzes', JSON.stringify(data));
                    this.renderList(data);
                }
            },

            async deleteQuiz(id){
                if(!confirm('Are you sure you want to delete this quiz?')) return;

                await supabase
                    .from('quizzes')
                    .delete()
                    .eq('id', id);
                this.sync();
            },

            loadQuiz(id){
                const cached = JSON.parse(localStorage.getItem('cached_quizzes') || '[]');
                const quiz = cached.find(q => q.id === id);
                if(quiz) {
                    sessionStorage.setItem('activeQuiz', JSON.stringify(quiz.data));
                    window.location.href = './quiz.html';
                }
            },

            editQuiz(id){
                const cached = JSON.parse(localStorage.getItem('cached_quizzes') || '[]');
                const quiz = cached.find(q => q.id === id);
                if(quiz) {
                    sessionStorage.setItem('activeQuiz', JSON.stringify(quiz.data));
                    window.location.href = './editor.html';
                }
            },

            renderList(data = null) {
                const grid = document.getElementById('quiz-grid');
                const quizzes = data || JSON.parse(localStorage.getItem('cached_quizzes') || '[]');
                
                grid.innerHTML = quizzes.length ? '' : '<p class="empty-state">No quizzes found.</p>';
                
                quizzes.forEach(q => {
                    const hue = q.topic.length * 42 % 360; 
                    const thumbColor = `hsl(${hue}, 60%, 80%)`;

                    const card = document.createElement('div');
                    card.className = "quiz-card";
                    card.style.borderTop = `6px solid ${thumbColor}`;
                    
                    card.onmouseenter = () => card.style.transform = "translateY(-5px)";
                    card.onmouseleave = () => card.style.transform = "translateY(0)";

                    card.innerHTML = `
                        <div class="quiz-card-inner">
                            <div class="quiz-card-top">
                                <div>
                                    <h4 class="quiz-topic">${q.topic}</h4>
                                    <small class="quiz-difficulty">${q.difficulty}</small>
                                </div>
                                <button onclick="quizManager.deleteQuiz('${q.id}')" class="delete-btn" aria-label="Delete quiz">&times;</button>
                            </div>
                            <div class="card-actions">
                                <button onclick="quizManager.loadQuiz('${q.id}')" class="btn-primary">
                                    Play
                                </button>
                                <button onclick="quizManager.editQuiz('${q.id}')" class="btn-outline-sm">
                                    Edit
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },
        }
    quizManager.renderList();
    quizManager.sync();
    window.quizManager = quizManager;
    </script>
</body>
</html>
